<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern To-Do Task Manager</title>

    <!-- Linking CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Modern To-Do Task Manager</h1>

        <!-- Input Section -->
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter a task...">

            <button id="addTaskBtn">
                Add Task
            </button>
        </div>

        <!-- Task List -->
        <ul id="taskList"></ul>

    </div>

    <!-- Linking JavaScript -->
    <script src="script.js"></script>

</body>
</html>
